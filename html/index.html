<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Relatórios</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="img/logo_gray.png" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.72/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.72/vfs_fonts.js"></script>
</head>

<body>
    <div class="container">
        <h1>Gerador de Relatórios</h1>

        <form id="form-logistica">
            <label for="relatorio-id">ID do Relatório / Ordem de Serviço:</label>
            <input type="text" id="relatorio-id" name="relatorio-id" placeholder="Ex: RL-2024-001" required />

            <label for="data-operacao">Data da Operação:</label>
            <input type="date" id="data-operacao" name="data-operacao" required />

            <label for="responsavel">Operador Responsável:</label>
            <input type="text" id="responsavel" name="responsavel" placeholder="Nome do conferente" required />

            <hr>

            <label for="tipo-movimentacao">Tipo de Movimentação:</label>
            <select id="tipo-movimentacao" name="tipo-movimentacao">
                <option value="entrada">Entrada (Recebimento)</option>
                <option value="saida">Saída (Expedição)</option>
                <option value="transferencia">Transferência Interna</option>
                <option value="inventario">Inventário Cíclico</option>
            </select>

            <label for="nota-fiscal">Nota Fiscal (NF-e):</label>
            <input type="text" id="nota-fiscal" name="nota-fiscal" placeholder="Número da Nota Fiscal" />

            <hr>

            <label for="status-carga">Status da Carga:</label>
            <select id="status-carga" name="status-carga">
                <option value="conferido">Conferido e OK</option>
                <option value="divergencia">Divergência de Quantidade</option>
                <option value="avaria">Avaria Identificada</option>
            </select>

            <label for="observacoes">Observações e Ocorrências:</label>
            <textarea id="observacoes" name="observacoes" rows="4" placeholder="Descreva problemas com embalagem, atrasos da transportadora, etc."></textarea>

            <div class="botoes mensagem-e-botao">
                <input type="text" name="website" id="website" style="display:none;" autocomplete="off" />
                <button type="button" id="gerar-pdf">Gerar Currículo em PDF</button>
                <div>
                    <div id="mensagem-erro" class="mensagem-erro"></div>
                    <div id="mensagem-sucesso" class="mensagem-sucesso"></div>
                </div>
            </div>

        </form>
    </div>

    <script src="js/script.js"></script>

    <footer class="footer">
        <p>
            Desenvolvido por <strong>Ewerton Souza</strong> •
            &copy; <span id="ano-atual"></span>
        </p>
    </footer>

</body>

</html>
