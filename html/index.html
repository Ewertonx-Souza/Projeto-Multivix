<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerador de Relatório - Galpão</title>

  <!-- Biblioteca pra gerar PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Relatório de Recebimento de Carga</h1>
    <p class="subtitulo">Preencha os campos abaixo para gerar o relatório em PDF</p>

    <!-- Dados do Funcionário -->
    <div class="secao">
      <h2>Dados do Funcionário</h2>

      <label for="nomeFuncionario">Nome do Funcionário:</label>
      <input type="text" id="nomeFuncionario" placeholder="Ex: João da Silva" />

      <label for="cargo">Cargo:</label>
      <input type="text" id="cargo" placeholder="Ex: Conferente, Auxiliar de Logística..." />

      <label for="turno">Turno:</label>
      <select id="turno">
        <option value="">Selecione o turno</option>
        <option value="Manhã">Manhã</option>
        <option value="Tarde">Tarde</option>
        <option value="Noite">Noite</option>
      </select>
    </div>

    <!-- Dados do Veículo -->
    <div class="secao">
      <h2>Dados do Veículo</h2>

      <label for="placa">Placa do Veículo:</label>
      <input type="text" id="placa" placeholder="Ex: ABC-1234" maxlength="8" />

      <label for="tipoVeiculo">Tipo de Veículo:</label>
      <select id="tipoVeiculo">
        <option value="">Selecione o tipo</option>
        <option value="Truck">Truck</option>
        <option value="Carreta">Carreta</option>
        <option value="Van / Furgão">Van / Furgão</option>
        <option value="Caminhão Baú">Caminhão Baú</option>
        <option value="Bitrem">Bitrem</option>
      </select>

      <label for="nomeMotorista">Nome do Motorista:</label>
      <input type="text" id="nomeMotorista" placeholder="Ex: Carlos Pereira" />

      <label for="transportadora">Transportadora:</label>
      <input type="text" id="transportadora" placeholder="Ex: Transportes Rápido Ltda" />
    </div>

    <!-- Dados da Carga -->
    <div class="secao">
      <h2>Dados da Carga</h2>

      <label for="qtdNotas">Quantidade de Notas Fiscais:</label>
      <input type="number" id="qtdNotas" placeholder="Ex: 5" min="0" />

      <label for="qtdVolumes">Quantidade de Volumes / Volumes:</label>
      <input type="number" id="qtdVolumes" placeholder="Ex: 120" min="0" />

      <label for="pesoTotal">Peso Total (kg):</label>
      <input type="number" id="pesoTotal" placeholder="Ex: 3500" min="0" />

      <label for="tipoCarga">Tipo de Mercadoria:</label>
      <input type="text" id="tipoCarga" placeholder="Ex: Eletrônicos, Alimentos, Peças..." />

      <label for="condicaoCarga">Condição da Carga:</label>
      <select id="condicaoCarga">
        <option value="">Selecione</option>
        <option value="Íntegra / Sem avarias">Íntegra / Sem avarias</option>
        <option value="Com avarias leves">Com avarias leves</option>
        <option value="Com avarias graves">Com avarias graves</option>
        <option value="Carga incompleta">Carga incompleta</option>
      </select>
    </div>

    <!-- Horários -->
    <div class="secao">
      <h2>Horários</h2>

      <label for="dataRecebimento">Data do Recebimento:</label>
      <input type="date" id="dataRecebimento" />

      <label for="horaChegada">Hora de Chegada:</label>
      <input type="time" id="horaChegada" />

      <label for="horaInicio">Hora de Início da Descarga:</label>
      <input type="time" id="horaInicio" />

      <label for="horaTermino">Hora de Término / Saída:</label>
      <input type="time" id="horaTermino" />
    </div>

    <!-- Observações -->
    <div class="secao">
      <h2>Observações</h2>
      <textarea id="observacoes" rows="4" placeholder="Descreva aqui qualquer ocorrência, divergência ou informação adicional..."></textarea>
    </div>

    <button id="btnGerar" onclick="gerarPDF()">Gerar Relatório em PDF</button>
  </div>

  <footer>
    <p>Sistema de Relatório de Galpão &copy; 2025</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
